name: MLOps CI/CD Pipeline

# This tells GitHub to run the script every time you push to main/master
on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    # Step 1: Push the updated files to your AWS Server
    - name: Copy files to AWS via SCP
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.AWS_HOST }}
        username: ubuntu
        key: ${{ secrets.AWS_PRIVATE_KEY }}
        source: "serving/, Dockerfile, requirements.txt, model/"
        target: "/home/ubuntu"

    # Step 2: SSH into the server, kill the old API, and build the new one
    - name: Build and Restart API via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.AWS_HOST }}
        username: ubuntu
        key: ${{ secrets.AWS_PRIVATE_KEY }}
        script: |
          # Stop and remove whatever container is holding port 8000
          sudo docker stop $(sudo docker ps -q --filter "publish=8000") || true
          sudo docker rm $(sudo docker ps -aq --filter "publish=8000") || true
          
          # Build and run the fresh code
          sudo docker build -t mlops-api .
          sudo docker run -d -p 8000:8000 mlops-api